<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Simon Game</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
</head>

<body>

  <h1 id="level-title">Press A Key to Start</h1>

  <div class="game-layout">

    <!-- Simon Game -->
    <div class="container">

      <div class="row">
        <div id="green" class="btn green"></div>
        <div id="red" class="btn red"></div>
      </div>

      <div class="row">
        <div id="yellow" class="btn yellow"></div>
        <div id="blue" class="btn blue"></div>
      </div>

    </div>

    <!-- Instructions -->
    <div class="instructions">
      <h2>How to Play</h2>
      <ul>
        <li>Press any key to start the game.</li>
        <li>Watch the button that lights up.</li>
        <li>Remember the complete sequence.</li>
        <li>Click the buttons in the same order.</li>
        <li>Each level adds one new color.</li>
        <li>A wrong click ends the game.</li>
        <li>Press any key to restart.</li>
      </ul>
    </div>

  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="index.js"></script>

</body>

</html>
